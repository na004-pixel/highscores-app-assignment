services:
  mongo:
    image: mongo:7
    container_name: highscores-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: highscores-app
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: highscores-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "3000:3000"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: highscores-admin
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "3001:3001"

volumes:
  mongo-data:
